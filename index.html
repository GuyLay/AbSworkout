<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f0f0f" />
  <title>ABS Workout</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- Tab bar — populated dynamically from days.json -->
    <nav class="tab-bar" id="tab-bar" role="tablist"></nav>

    <!-- Day info strip: name + total practice time -->
    <div class="day-info" id="day-info">
      <span class="day-name" id="day-name">—</span>
      <span class="day-total-time" id="day-total-time">—</span>
    </div>

    <!-- ── Exercise Screen ── -->
    <section class="screen" id="screen-exercise" aria-live="polite">

      <div class="ex-header">
        <p class="progress-label" id="progress-label">Exercise 1 of 3</p>
        <p class="set-label"      id="set-label">Set 1 of 2</p>
      </div>

      <h1 class="exercise-name" id="exercise-name">Exercise Name</h1>
      <p  class="exercise-desc" id="exercise-desc">Description goes here.</p>

      <!-- Video or image rendered by JS -->
      <div class="media-wrap" id="media-wrap">
        <div class="media-placeholder" id="media-placeholder">No media</div>
      </div>

      <!-- SVG circular countdown ring -->
      <div class="timer-wrap">
        <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="ring-track"    cx="60" cy="60" r="52" />
          <circle class="ring-progress" id="ring-progress" cx="60" cy="60" r="52" />
        </svg>
        <span class="timer-text" id="timer-text">--</span>
      </div>

      <!-- Dot timeline: one dot per exercise in the set -->
      <div class="timeline" id="timeline" aria-hidden="true"></div>

      <div class="btn-row">
        <button class="btn btn-start" id="btn-start" aria-label="Start exercise">&#9654; Start</button>
        <button class="btn btn-done"  id="btn-done"  aria-label="Mark exercise done">&#10003; Done</button>
      </div>
    </section>

    <!-- ── Rest Screen ── -->
    <section class="screen hidden" id="screen-rest" aria-live="assertive">
      <h2 class="rest-label">REST</h2>

      <div class="timer-wrap">
        <svg class="ring" viewBox="0 0 120 120" aria-hidden="true">
          <circle class="ring-track" cx="60" cy="60" r="52" />
          <circle class="ring-progress ring-rest" id="ring-rest" cx="60" cy="60" r="52" />
        </svg>
        <span class="timer-text" id="rest-timer-text">--</span>
      </div>

      <p class="next-up-label" id="next-up-label">Up next</p>
      <p class="next-up-name"  id="next-up-name">—</p>

      <button class="btn-skip-rest" id="btn-skip-rest" aria-label="Skip rest">&#9654; Skip Rest</button>
    </section>

    <!-- ── Complete Screen ── -->
    <section class="screen hidden" id="screen-complete" aria-live="polite">
      <div class="complete-inner">
        <div class="complete-icon">&#127881;</div>
        <h2 class="complete-title">Workout Complete!</h2>
        <p  class="complete-sub">Great work today. See you next session.</p>
        <button class="btn btn-restart" id="btn-restart">Restart Day</button>
      </div>
    </section>

  </div><!-- /#app -->

  <script src="app.js"></script>
</body>
</html>
